<!DOCTYPE html>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }

    header {
      text-align: center;
      padding: 25px;
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 3px;
      border-bottom: 1px solid #222;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
      padding: 40px;
    }

    .product {
      background: #1a1a1a;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 0 15px rgba(0,0,0,0.4);
    }

    .product img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 8px;
    }

    .product h3 {
      margin: 15px 0 5px;
    }

    .price {
      font-weight: bold;
      margin-bottom: 10px;
    }

    select {
      width: 100%;
      padding: 8px;
      margin: 6px 0;
      background: #111;
      color: white;
      border: 1px solid #333;
      border-radius: 5px;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      background: white;
      color: black;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #ccc;
    }

    footer {
      text-align: center;
      padding: 20px;
      border-top: 1px solid #222;
      color: #888;
      font-size: 14px;
    }
  </style>
</head>
